name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install dependencies
        run: |
          cd automation-tests/ui_tests/saucedemo
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run UI tests (Selenium + Playwright)
        run: |
          cd automation-tests/ui_tests/saucedemo
          pytest -v -m "not selenium" tests/

  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          cd automation-tests/api_tests/restcountries
          pip install -r requirements.txt

      - name: Run API tests
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          cd automation-tests/api_tests/restcountries
          pytest -v tests/